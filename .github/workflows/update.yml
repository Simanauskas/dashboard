name: Daily Garmin Update

on:
  schedule:
    - cron: '0 5-9 * * *'     # 05:00-09:00 UTC = 08:00-12:00 LT — full update hourly until synced
    - cron: '0 10-20 * * *'   # hourly 10:00-20:00 UTC (13:00-23:00 LT) — activities only
  workflow_dispatch:
    inputs:
      mode:
        description: 'full or activities'
        required: false
        default: 'full'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "garth==0.4.47" "garminconnect==0.2.8" requests

      - name: Restore Garmin tokens
        run: |
          mkdir -p ~/.garth
          echo '${{ secrets.GARTH_OAUTH1 }}' > ~/.garth/oauth1_token.json
          echo '${{ secrets.GARTH_OAUTH2 }}' > ~/.garth/oauth2_token.json

      - name: Refresh and persist tokens
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: python token_refresh.py

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            # Full wellness fetch 05:00-09:00 UTC (08:00-12:00 LT) — catches watch sync
            if [ "$HOUR" -ge 5 ] && [ "$HOUR" -le 9 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=activities" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=${{ inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run update
        run: python update.py --mode ${{ steps.mode.outputs.mode }}

      - name: Commit and push if changed
        run: |
          git config user.name  "garmin-bot"
          git config user.email "bot@simanauskas.github.io"
          git add src/App.jsx
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
