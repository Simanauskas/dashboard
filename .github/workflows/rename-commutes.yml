name: Rename Bike Commutes (one-off)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Set to "true" to actually rename. Anything else = dry run.'
        required: false
        default: 'false'

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "garth==0.4.47" requests

      - name: Restore Garmin tokens
        run: |
          mkdir -p ~/.garth
          echo '${{ secrets.GARTH_OAUTH1 }}' > ~/.garth/oauth1_token.json
          echo '${{ secrets.GARTH_OAUTH2 }}' > ~/.garth/oauth2_token.json

      - name: Run rename
        run: |
          if [ "${{ inputs.apply }}" = "true" ]; then
            python rename_commutes.py --apply
          else
            python rename_commutes.py
          fi
